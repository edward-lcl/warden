name: Issue Triage

# Lightweight triage only. Real classification is handled out-of-band by the
# OCPlatform-native poller (automation/warden_issue_poller.py), which calls the
# local model proxy and needs no API keys in GitHub secrets.

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Label as needs-triage
        run: gh issue edit ${{ github.event.issue.number }} --add-label "needs-triage" --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
